<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      width: 200px;
      padding: 15px;
      background-color: #f5f5f5;
    }
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="button-container">
    <div id="modeDisplay" style="text-align:center;font-size:13px;color:#333;margin-bottom:6px;">当前模式：<span id="modeValue">-</span></div>
    <button id="startSelector">开始选择元素</button>
    <button id="toggleMode">切换模式</button>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
